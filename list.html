<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>

<body>
    <h1>List</h1>
    <ol>
        <li>
            <h2>Unodered list</h2>

            <ul style="list-style-type:square;">
                <li>YASH</li>
                <li>MEET</li>
                <li>SHEETAL</li>
                <li>NILESh</li>
            </ul>
        </li>
        <li>
            <h2>Odered list</h2>
            <ol style="list-style-type:lower-roman;">
                <li>10</li>
                <li>18</li>
                <li>47</li>
                <li>60</li>
                <li>97</li>
            </ol>
        </li>
        <li>
            <h2>Data list</h2>
            <dl>
                <dt>Coffe</dt>
                <dd>Hot Coffe</dd>
                <dd>Cold Coffe</dd>


            </dl>
        </li>
    </ol>
</body>


</html>
